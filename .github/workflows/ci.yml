name: CI

# Verifies the library typechecks and builds on every push / PR, so a broken
# package never reaches a release tag.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/muscle-map
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npm run typecheck

      - name: Build (commonjs + esm + types)
        run: npm run build
